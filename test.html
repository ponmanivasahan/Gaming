<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Screen - Static</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0; padding:0; background:#000;">

<div id="initialLoader" style="position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000;">
    <img src="images/start.png" alt="Loading" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.3;">
    <div style="position:absolute; inset:0; background:rgba(0,0,0,0.35);"></div>
    <div style="position:relative; z-index:2; text-align:center;">
        <div style="font-family:'Rajdhani',sans-serif; font-size:30px; color:#fff; text-shadow:0 0 12px rgba(0,0,0,0.9);">0%</div>
        <div style="margin-top:18px; width:280px; height:18px; position:relative; margin-left:auto; margin-right:auto;">
            <div style="position:absolute; inset:0; border:1px solid rgba(255,160,0,0.5); border-radius:12px; overflow:hidden; background:rgba(0,0,0,0.35);"></div>
            <div style="position:absolute; inset:0; width:0%; background:linear-gradient(90deg, rgba(255,200,80,0.92), rgba(255,120,20,0.9), rgba(255,80,0,0.8)); box-shadow:0 0 15px rgba(255,120,20,0.45);"></div>
      
    </div>
  </div>
</div>

</body>
</html>
