<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samurai Fighter - Battle Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" 
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <canvas id="confettiCanvas"></canvas>
    <div id="modalOverlay">
        <div id="modalBox">
            <div id="modalMessage"></div>
            <div id="modalButtons"></div>
        </div>
    </div>

    <!-- Start Screen -->
     <div id="startScreen">
        <div class="ss-coin-badge"><span id="startScreenCoins">500</span>&nbsp;COINS</div>
        <div class="ss-inner">
            <div class="ss-accent-bar"></div>
            <p class="ss-eyebrow">BATTLE ARENA</p>
            <h1 class="ss-main-title">SAMURAI <br>FIGHTER</h1>
            <p class="ss-tagline">Choose your warrior &nbsp;&bull;&nbsp; Enter the arena &nbsp;&bull;&nbsp; Prove your blade</p>
            <div class="ss-divider"><div class="ss-divider-gem"></div></div>
        </div>
        <div class="ss-fighters">
            <div class="ss-card p1">
                <span class="ss-card-lbl">PLAYER 1</span>
                <input type="text" id="player1NameInput"  placeholder="ENTER NAME" maxlength="15" class="ss-card-input" value="player 1" />
            </div>
            <div class="ss-vs-col">
                <div class="ss-vs-line"></div>
                <span class="ss-vs-text">VS</span>
                <div class="ss-vs-line"></div>
            </div>
            <div class="ss-card p2">
                <span class="ss-card-lbl" id="p2SlotLabel">Player 2</span>
                <input type="text" id="player2NameInput" placeholder="Enter NAME" maxlength="15" class="ss-card-input" value="Player 2" />
            </div>
        </div>

        <div class="ss-mode-row">
            <div id="mode2P" class="ss-mode-pill active" onclick="window.selectMode('2p')">2 Players</div>
            <div id="modeCOOP" class="ss-mode-pill" onclick="window.selectMode('co-op')">VS CO-Op</div>
        </div>
        <div id="difficultySelector">
            <select id="aiDifficulty" class="diff-select">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <div class="ss-actions">
            <button class="btn ss-start-btn" onclick="window.startGame()">START GAME</button>
            <div class="ss-sec-row">
                <button class="btn ss-sec-btn" onclick="window.showShop()">SHOP</button>
                <button class="btn ss-sec-btn" onclick="window.showHowToPlay()">How To Play</button>
            </div>
        </div>
     </div>

</body>
</html>
